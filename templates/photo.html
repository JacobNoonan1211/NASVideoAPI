<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ display_name }}</title>
</head>
<body>
    <p>
        <a href="{{ back_url }}">← Back</a>
        {% if prev_url %} | <a href="{{ prev_url }}" id="prev-link">‹ Prev</a>{% endif %}
        {% if next_url %} | <a href="{{ next_url }}" id="next-link">Next ›</a>{% endif %}
    </p>

    <h3>{{ display_name }}</h3>

    <p><img src="{{ image_url }}" alt="{{ display_name }}" height="700"></p>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                const el = document.getElementById('prev-link');
                if (el) el.click();
            } else if (e.key === 'ArrowRight') {
                const el = document.getElementById('next-link');
                if (el) el.click();
            }
        });
    </script>
</body>
</html>
